<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Guidelines — FB Auto-Reply</title>
<style>
  body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; color: #222; }
  nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid #ddd; }
  nav a { color: #06c; text-decoration: none; font-weight: 500; }
  nav a:hover { text-decoration: underline; }
  h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
  .saved { background: #d4edda; color: #155724; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
  textarea {
    width: 100%; box-sizing: border-box;
    min-height: 70vh;
    font: 13px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
    padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px;
    resize: vertical;
  }
  button { font: inherit; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid #06c; background: #06c; color: white; cursor: pointer; margin-top: 0.75rem; }
</style>
</head>
<body>

<nav>
  <a href="/">Drafts</a>
  <a href="/listings">Listings</a>
  <a href="/guidelines">Guidelines</a>
  <a href="/history">History</a>
  <a href="/config">Config</a>
</nav>

<h1>Guidelines</h1>
<p style="color:#666; margin-top:0;">Edits save to <code>guidelines.md</code> and take effect on the next cycle. Markdown.</p>

{% if saved %}<div class="saved">✅ Saved.</div>{% endif %}

<form method="post" action="/guidelines/save">
  <textarea name="body" spellcheck="true">{{ body }}</textarea>
  <button type="submit">Save</button>
</form>

</body>
</html>
